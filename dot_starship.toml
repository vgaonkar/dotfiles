# Command Duration - Storm background
[cmd_duration]
min_time = 2000
style = "bg:storm fg:yellow bold"
format = "[ÔÅ▒ $duration]($style)"

# Time - Storm background
[time]
disabled = false
time_format = "%H:%M"
style = "bg:storm fg:gray"
format = "[¾░Ñö $time]($style)"

# Battery - Black background
[battery]
full_symbol = "­şöï "
charging_symbol = "ÔÜí "
discharging_symbol = "­şöî "
unknown_symbol = "ÔØô "
empty_symbol = "­ş¬½ "
format = "[$symbol$percentage]($style)"
