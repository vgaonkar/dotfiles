[[battery.display]]
threshold = 20
style = "bg:black fg:red bold"

[[battery.display]]
threshold = 50
style = "bg:black fg:yellow"

[[battery.display]]
threshold = 100
style = "bg:black fg:green"

# Prompt Character - No background
[character]
success_symbol = "[ÔØ»](fg:green bold)"
error_symbol = "[ÔØ»](fg:red bold)"
vimcmd_symbol = "[ÔØ«](fg:purple bold)"

# Status
[status]
style = "bg:red fg:white bold"
symbol = "Ô£û "
success_symbol = ""
signal_symbol = "­şøæ "
format = "[$symbol$status]($style) "
