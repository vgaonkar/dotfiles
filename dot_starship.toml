# Tokyo Night Powerline Starship Configuration
# Powerlevel10k-style with angled arrows and background colors
# https://starship.rs/config/

add_newline = false

# Powerline format with background colors and angled separators
format = """
[¯éÂ](bg:storm fg:blue)\
$os\
$username\
[¯é░](bg:dark_gray fg:storm)\
$directory\
[¯é░](bg:orange fg:dark_gray)\
$git_branch\
$git_status\
[¯é░](bg:storm fg:orange)\
$fill\
[¯é▓](bg:storm fg:dark_gray)\
$nodejs\
$python\
$golang\
$rust\
$java\
$ruby\
[¯é▓](bg:dark_gray fg:storm)\
$cmd_duration\
$time\
[¯é▓](bg:black fg:dark_gray)\
$battery\
$line_break\
$character"""

# Tokyo Night Color Palette with Powerline backgrounds
palette = "tokyo_night_powerline"

[palettes.tokyo_night_powerline]
# Foreground colors
red = "#f7768e"
orange = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
cyan = "#73daca"
blue = "#7aa2f7"
purple = "#bb9af7"
white = "#c0caf5"
light_gray = "#a9b1d6"
gray = "#565f89"
# Background colors for powerline
black = "#1a1b26"
storm = "#24283b"
dark_gray = "#414868"

# OS Icon - Blue background
[os]
disabled = false
style = "bg:storm fg:blue bold"
format = "[$symbol ]($style)"

[os.symbols]
Ubuntu = "¾░òê"
Linux = "¾░î¢"
Debian = "¾░úÜ"
Macos = "¾░ÇÁ"
Windows = "¾░ı▓"
Arch = "¾░úç"

# Username - Blue background, transitions to dark_gray
[username]
show_always = true
style_user = "bg:storm fg:white"
style_root = "bg:storm fg:red bold"
format = "[$user]($style)"

# Hostname - SSH only
[hostname]
ssh_only = true
style = "bg:storm fg:purple"
format = "[@$hostname]($style)"

# Directory - Dark gray background, transitions to orange
[directory]
style = "bg:dark_gray fg:white bold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
read_only = " ¾░î¥"
read_only_style = "bg:dark_gray fg:red"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Projects" = "¾░▓ï "
"Desktop" = "´äê "
".config" = "¾░Æô "

# Git Branch - Orange background
[git_branch]
symbol = "´Éİ "
style = "bg:orange fg:black bold"
format = "[$symbol$branch]($style)"

# Git Status - Orange background
[git_status]
style = "bg:orange fg:black"
format = "([$all_status$ahead_behind]($style))"
conflicted = "­şÅ│"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçò"
up_to_date = "Ô£ô"
untracked = "?${count}"
stashed = "­şôĞ"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗"
deleted = "Ô£İ"

# Git Metrics - Orange background
[git_metrics]
disabled = false
added_style = "bg:orange fg:green bold"
deleted_style = "bg:orange fg:red bold"
format = "([+$added]($added_style)[-$deleted]($deleted_style))"

# Fill - Storm background (separator area)
[fill]
symbol = " "

# Node.js - Dark gray background, transitions left
[nodejs]
symbol = "¯£İ "
style = "bg:dark_gray fg:green bold"
format = "[$symbol$version]($style)"
disabled = false

[python]
symbol = "¯êÁ "
style = "bg:dark_gray fg:yellow bold"
format = "[$symbol$version]($style)"
disabled = false

[golang]
symbol = "¯İğ "
style = "bg:dark_gray fg:cyan bold"
format = "[$symbol$version]($style)"
disabled = false

[rust]
symbol = "¯Ş¿ "
style = "bg:dark_gray fg:orange bold"
format = "[$symbol$version]($style)"
disabled = false

[java]
symbol = "¯ëû "
style = "bg:dark_gray fg:red bold"
format = "[$symbol$version]($style)"
disabled = false

[ruby]
symbol = "¯Şæ "
style = "bg:dark_gray fg:red bold"
format = "[$symbol$version]($style)"
