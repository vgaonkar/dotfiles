# Minimal Developer-Focused Starship Configuration
add_newline = false

# Show directory, git, languages, then prompt
format = "$directory$git_branch$nodejs$python$golang$rust$java$ruby$character"

# Catppuccin colors
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
mauve = "#cba6f7"
blue = "#89b4fa"
green = "#a6e3a1"
yellow = "#f9e2af"
teal = "#94e2d5"
peach = "#fab387"
red = "#f38ba8"

[directory]
truncation_length = 1
style = "fg:blue"

[git_branch]
style = "fg:mauve"
format = "[$branch]($style) "

# Language modules - minimal icons
[nodejs]
disabled = false
symbol = ""
style = "fg:green"
format = "[($version)]($style) "

[python]
disabled = false
symbol = ""
style = "fg:yellow"
format = "[($version)]($style) "

[golang]
disabled = false
symbol = ""
style = "fg:teal"
format = "[($version)]($style) "

[rust]
disabled = false
symbol = ""
style = "fg:peach"
format = "[($version)]($style) "

[java]
disabled = false
symbol = ""
style = "fg:red"
format = "[($version)]($style) "

[ruby]
disabled = false
symbol = ""
style = "fg:red"
format = "[($version)]($style) "

[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"
