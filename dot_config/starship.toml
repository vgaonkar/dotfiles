# Starship prompt based on adamdehaven.com snippet
# Adapted to avoid deprecated/emoji glyphs that can render as boxes.

# Insert a blank line between shell prompts
add_newline = true

# Increase the default command timeout to 2 seconds
command_timeout = 2000

# Theme (place BEFORE the palettes table)
palette = "catppuccin_macchiato"

# Define the order and format of the information in our prompt
format = """\
$hostname\
[](fg:#3B76F0)\
$directory\
${custom.directory_separator_not_git}\
${custom.directory_separator_git}\
$git_branch\
${custom.git_end_separator}\
$git_commit$git_status$git_metrics$git_state\
\n$character"""

right_format = "$cmd_duration$nodejs${custom.work}${custom.git_config_email}"

# Fill character (empty space) between the left and right prompt
[fill]
symbol = " "

# Disable the line break between the first and second prompt lines
[line_break]
disabled = true

# Customize the format of the working directory
[directory]
truncate_to_repo = true
format = "[󰉋 $path ]($style)"
style = "fg:text bg:#3B76F0"

[git_branch]
symbol = " "
format = "[ $symbol$branch ]($style)"
style = "fg:#1C3A5E bg:#FCF392"

[git_status]
format = "[\\[$all_status$ahead_behind\\]]($style) "
style = "red"

[git_commit]
format = '[\($hash\)]($style) '
style = "fg:#1C3A5E bg:#FCF392"

[git_metrics]
disabled = false
format = "[+$added]($added_style) [-$deleted]($deleted_style) "
added_style = "green"
deleted_style = "red"

[nodejs]
symbol = " "
format = "via [$symbol$version]($style) "
style = "text"

[package]
disabled = true

# Output the command duration if over 2 seconds
[cmd_duration]
min_time = 2_000
format = "[󰥔 $duration]($style) "
style = "fg:gray"

# Show WORK indicator when WORK_MACHINE env var is set
[custom.work]
description = "Show work machine indicator when WORK_MACHINE is set."
command = "echo '󰼑 WORK'"
format = "[$output]($style) "
when = '[ "$WORK_MACHINE" = "true" ]'
style = "bold yellow"

# Output the current git config email address
[custom.git_config_email]
description = "Output the current git user's configured email address."
command = "git config user.email"
format = "[ $output]($style) "
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "text"

[character]
success_symbol = "[❯](green) "
error_symbol = "[❯](red) "

# Output a styled separator right after the directory when inside a git repository.
[custom.directory_separator_git]
description = "Output a styled separator right after the directory when inside a git repository."
command = ""
format = "[](fg:#3B76F0 bg:#FCF392)"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[custom.git_end_separator]
description = "Output a styled separator after the git segment when inside a git repository."
command = ""
format = "[](fg:#FCF392)"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

# Output a styled separator right after the directory when NOT inside a git repository.
[custom.directory_separator_not_git]
description = "Output a styled separator right after the directory when NOT inside a git repository."
command = ""
format = "[](fg:#3B76F0)"
when = "! git rev-parse --is-inside-work-tree > /dev/null 2>&1"

# Catppuccin Macchiato color palette
[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

# Show hostname when SSH'd or in container (invisible on local Mac)
[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
style = "bold fg:#f5a97f"
ssh_symbol = "󰒋 "
disabled = false
