# Starship configuration
# https://starship.rs/config/

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"""

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ""

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"

[username]
show_always = false

[hostname]
ssh_only = true
format = "[$hostname](bold blue) "

[battery]
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
display = [{ threshold = 20, style = "bold red" }]

[time]
disabled = true
