<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="900" height="500" rx="8" fill="#24273a"/>
  <!-- title bar -->
  <rect width="900" height="32" rx="8" fill="#363a4f"/>
  <rect x="0" y="16" width="900" height="16" fill="#363a4f"/>
  <circle cx="16" cy="16" r="6" fill="#ed8796"/>
  <circle cx="34" cy="16" r="6" fill="#eed49f"/>
  <circle cx="52" cy="16" r="6" fill="#a6da95"/>
  <text x="450" y="21" text-anchor="middle" font-family="'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#a5adcb">delta - git diff</text>
  <style>text { font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; }</style>
  <text x="20" y="50" fill="#c6a0f6">❯ </text>
  <text x="36.8" y="50" fill="#cad3f5">git diff</text>
  <text x="20" y="70" fill="#494d64">── </text>
  <text x="45.2" y="70" fill="#8aadf4">dot_config/starship.toml</text>
  <text x="246.8" y="70" fill="#494d64"> ──────────────────────────</text>

  <text x="20" y="110" fill="#a5adcb">  [character]</text>
  <text x="20" y="130" fill="#ed8796">- </text>
  <text x="36.8" y="130" fill="#ed8796">success_symbol = &quot;[→](bold green)&quot;</text>
  <text x="20" y="150" fill="#a6da95">+ </text>
  <text x="36.8" y="150" fill="#a6da95">success_symbol = &quot;[❯](green)&quot;</text>
  <text x="20" y="170" fill="#cad3f5">  </text>
  <text x="36.8" y="170" fill="#a5adcb">error_symbol = &quot;[❯](red)&quot;</text>

  <text x="20" y="210" fill="#a5adcb">  [directory]</text>
  <text x="20" y="230" fill="#ed8796">- </text>
  <text x="36.8" y="230" fill="#ed8796">truncation_length = 5</text>
  <text x="20" y="250" fill="#a6da95">+ </text>
  <text x="36.8" y="250" fill="#a6da95">truncation_length = 3</text>
  <text x="20" y="270" fill="#a6da95">+ </text>
  <text x="36.8" y="270" fill="#a6da95">fish_style_pwd_dir_length = 1</text>
</svg>
