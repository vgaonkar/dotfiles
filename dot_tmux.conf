# =============================================================================
# tmux configuration — optimized for remote Claude Code sessions via Tailscale
# =============================================================================

# --- Prefix ---
# Ctrl+B (default) — works reliably across all terminals and SSH clients
# Ctrl+A conflicts with WezTerm (select all) and shell (beginning of line)
set -g prefix C-b
bind C-b send-prefix

# --- General ---
set -g mouse on                    # Enable mouse (scrolling, pane selection, resize)
set -g history-limit 50000         # Generous scrollback for long Claude sessions
set -g base-index 1                # Windows start at 1, not 0
setw -g pane-base-index 1          # Panes start at 1
set -g allow-rename off            # Don't auto-rename windows
set -g renumber-windows on         # Renumber when a window is closed
set -sg escape-time 10             # Reduce escape delay (critical for vim/editors)
set -g focus-events on             # Pass focus events to applications
set -g set-clipboard on            # Enable OSC 52 clipboard (works over SSH)

# --- Display ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # True color support
set -g display-time 3000           # Show messages for 3 seconds
set -g display-panes-time 3000     # Show pane numbers longer

# --- Status bar ---
set -g status-position bottom
set -g status-interval 10
set -g status-left-length 30
set -g status-right-length 60
set -g status-left '[#S] '
set -g status-right '#{?client_prefix,#[fg=red]PREFIX #[default],}#H | %H:%M %d-%b'
set -g status-style 'bg=colour235,fg=colour248'
setw -g window-status-current-style 'bg=colour238,fg=colour46,bold'

# --- Activity ---
setw -g monitor-activity on
set -g visual-activity off         # Don't flash on activity

# --- Key bindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Shift+arrow
bind -r S-Left resize-pane -L 2
bind -r S-Right resize-pane -R 2
bind -r S-Up resize-pane -U 2
bind -r S-Down resize-pane -D 2

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Session persistence ---
# Quick session switcher
bind s choose-tree -sZ

# Kill session shortcut
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# =============================================================================
# Clipboard & color enhancements
# =============================================================================

# OSC 52 clipboard — lets remote processes write to your local clipboard over SSH
# Requires an outer terminal that supports OSC 52 (WezTerm does natively)
# set-clipboard on: tmux uses OSC 52 when copying to its internal clipboard
# allow-passthrough on: applications inside panes can send OSC 52 through tmux
set -s set-clipboard on
set -g allow-passthrough on

# True color (RGB) override — ensures 24-bit color works in terminals that
# advertise xterm-256color but support full RGB (WezTerm, iTerm2, etc.)
set -ag terminal-overrides ",xterm-256color:RGB"

# =============================================================================
# Session persistence — tmux-resurrect + tmux-continuum
# =============================================================================
# Requires TPM (Tmux Plugin Manager). One-time install:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then reload tmux and press: Prefix + I  (capital I) to fetch plugins.
#
# Key bindings (once installed):
#   Prefix + Ctrl+S  — save session
#   Prefix + Ctrl+R  — restore session
#
# TPM installed — plugins active
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 minutes; auto-restore on tmux server start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Restore pane contents (requires shell history)
set -g @resurrect-capture-pane-contents 'on'

# =============================================================================
# Pass COLORTERM from outer shell into tmux sessions (truecolor support)
set -ga update-environment COLORTERM

# Failsafe: Auto-clean OMC state on client disconnect
# =============================================================================
# Fires when ANY client detaches — including abrupt SSH drops (closed WezTerm,
# network loss, laptop sleep). Cleans stale team/mission/HUD state so the next
# Claude Code session starts fresh.
set-hook -g client-detached 'run-shell -b "~/.local/bin/omc-session-cleanup.sh >> /tmp/omc-cleanup.log 2>&1"'

# Initialize TPM — must be the LAST line in tmux.conf
run '~/.tmux/plugins/tpm/tpm'
